<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>霓虹跑酷</title>
  <style>
* { box-sizing: border-box; }

:root {
  --accent-1: #5ce1a3;
  --accent-2: #4fd1ff;
  --accent-label: #7a8fb3;
  --accent-inv: #fbbf24;
  --accent-inv-light: #fde68a;
}

html, body {
  margin: 0;
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0a0e17;
  color: #e8f0ff;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}

.wrap {
  max-width: 920px;
  margin: 0 auto;
  padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) 1rem max(1rem, env(safe-area-inset-left));
}

.hud {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.5rem;
  font-size: 0.95rem;
  opacity: 0.9;
}

.hud .label { color: var(--accent-label); }

.score, .best { font-variant-numeric: tabular-nums; }

.best { color: var(--accent-1); }

.invincible {
  color: var(--accent-inv);
  font-variant-numeric: tabular-nums;
  opacity: 0;
  transform: translateY(-2px);
  transition: opacity 0.15s ease, transform 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}
.invincible.show {
  opacity: 1;
  transform: translateY(0);
}
.invincible .label {
  color: var(--accent-inv-light);
  letter-spacing: 0.04em;
}
.invincible .bar {
  width: 96px;
  height: 6px;
  border-radius: 999px;
  background: rgba(251, 191, 36, 0.2);
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.25);
}
.invincible .bar span {
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent-inv-light), var(--accent-inv));
  transition: width 0.08s linear, background 0.4s ease;
}

.hud,
.hud .label,
.best,
.invincible,
.invincible .label {
  transition: color 0.4s ease;
}
.invincible .bar,
.invincible .bar span {
  transition: box-shadow 0.4s ease, background 0.4s ease, width 0.08s linear;
}

#game {
  display: block;
  width: 100%;
  max-width: 900px;
  height: auto;
  border-radius: 12px;
  background: #111827;
  box-shadow:
    0 0 0 1px rgba(94, 225, 163, 0.15),
    0 12px 40px rgba(0, 0, 0, 0.45);
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

.overlay {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6, 10, 18, 0.88);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  z-index: 10;
  padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem max(1.5rem, env(safe-area-inset-bottom));
  text-align: center;
}

.overlay.hidden { display: none; }

#gameover { background: rgba(6, 10, 18, 0.35); }

.gameover-card {
  padding: 1.1rem 1.6rem 1.4rem;
  border-radius: 16px;
  background: rgba(7, 14, 26, 0.78);
  box-shadow:
    0 0 0 1px rgba(94, 225, 163, 0.18),
    0 16px 36px rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);
}

.gameover-card p {
  margin: 0.35rem 0 0.9rem;
  color: #cbd5f5;
}

.overlay h1 {
  margin: 0 0 0.5rem;
  font-size: clamp(1.75rem, 5vw, 2.25rem);
  font-weight: 700;
  letter-spacing: 0.08em;
  background: linear-gradient(120deg, #5ce1a3, #4fd1ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.overlay h2 { margin: 0 0 0.5rem; font-size: 1.35rem; }

.hint {
  margin: 0 0 1.25rem;
  color: #9cb0d0;
  font-size: 0.9rem;
  max-width: 22rem;
  line-height: 1.5;
}

.overlay button {
  cursor: pointer;
  border: none;
  padding: 0.65rem 1.6rem;
  font-size: 1rem;
  font-weight: 600;
  border-radius: 999px;
  color: #061018;
  background: linear-gradient(135deg, #5ce1a3, #3dd4ff);
  box-shadow: 0 4px 20px rgba(92, 225, 163, 0.35);
  transition: transform 0.12s ease, box-shadow 0.12s ease;
  touch-action: manipulation;
}

.overlay button:active { transform: scale(0.98); }

.encourage-toast {
  position: fixed;
  left: 50%;
  top: calc(env(safe-area-inset-top, 0px) + 0.75rem);
  transform: translateX(-50%) scale(0.75);
  opacity: 0;
  pointer-events: none;
  z-index: 25;
  max-width: min(90vw, 22rem);
  padding: 0.7rem 1.1rem;
  text-align: center;
  font-size: clamp(0.92rem, 3.4vw, 1.08rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #061018;
  background: linear-gradient(135deg, #5ce1a3, #4fd1ff);
  border-radius: 14px;
  box-shadow:
    0 0 0 2px rgba(255, 255, 255, 0.2),
    0 12px 40px rgba(79, 209, 255, 0.35),
    0 8px 24px rgba(0, 0, 0, 0.35);
  transition: opacity 0.22s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.encourage-toast.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

.boss-reward-toast {
  position: fixed;
  left: 50%;
  top: calc(env(safe-area-inset-top, 0px) + 3.2rem);
  transform: translateX(-50%) scale(0.86);
  opacity: 0;
  pointer-events: none;
  z-index: 26;
  max-width: min(90vw, 22rem);
  padding: 0.65rem 1.2rem;
  text-align: center;
  font-size: clamp(0.92rem, 3.4vw, 1.08rem);
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #061018;
  background: linear-gradient(135deg, #fde68a, #f59e0b);
  border-radius: 14px;
  box-shadow:
    0 0 0 2px rgba(255, 255, 255, 0.35),
    0 12px 32px rgba(245, 158, 11, 0.35);
  transition: opacity 0.22s ease, transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.boss-reward-toast.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

.shoot-btn {
  position: fixed;
  right: max(1rem, env(safe-area-inset-right));
  bottom: max(1rem, env(safe-area-inset-bottom));
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  color: #061018;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: radial-gradient(circle at 30% 30%, #ffffff, #5ce1a3 45%, #4fd1ff 100%);
  box-shadow:
    0 0 0 2px rgba(255, 255, 255, 0.25),
    0 10px 24px rgba(79, 209, 255, 0.35);
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 30;
}

.shoot-btn.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(0.9);
}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hud">
      <div class="score"><span class="label">距离</span> <span id="score">0</span> m</div>
      <div class="invincible" id="invincible" aria-live="polite">
        <span class="label">无敌</span>
        <span id="invincible-time">0.0</span>s
        <span class="bar" aria-hidden="true"><span id="invincible-bar"></span></span>
      </div>
      <div class="best">最佳 <span id="best">0</span> m</div>
    </header>
    <canvas id="game" width="900" height="420" aria-label="跑酷游戏画布"></canvas>
    <div id="overlay" class="overlay">
      <h1>霓虹跑酷</h1>
      <p class="hint">点击画面跳跃（空中可二段跳）<br />电脑可按空格</p>
      <p class="hint">有枪时：右下角射击 / 键盘 F、J<br />每10秒出现Boss“华雄”，跳跃可躲子弹</p>
      <button type="button" id="start">开始游戏</button>
    </div>
    <div id="gameover" class="overlay hidden">
      <div class="gameover-card">
        <h2>Game Over</h2>
        <p>本次 <span id="final">0</span> m</p>
        <button type="button" id="retry">再来一局</button>
      </div>
    </div>
    <div id="encourage-toast" class="encourage-toast" role="status" aria-live="polite"></div>
    <div id="boss-reward" class="boss-reward-toast" role="status" aria-live="polite">击败Boss奖励</div>
    <button id="shoot" class="shoot-btn hidden" type="button">射击</button>
  </div>
  <script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const gameover = document.getElementById("gameover");
  const finalEl = document.getElementById("final");
  const btnStart = document.getElementById("start");
  const btnRetry = document.getElementById("retry");
  const encourageToast = document.getElementById("encourage-toast");
  const invincibleWrap = document.getElementById("invincible");
  const invincibleTimeEl = document.getElementById("invincible-time");
  const invincibleBarEl = document.getElementById("invincible-bar");
  const shootBtn = document.getElementById("shoot");
  const bossRewardToast = document.getElementById("boss-reward");

  if (!ctx) return;

  const W = canvas.width;
  const H = canvas.height;
  const GROUND_Y = H - 72;
  const GRAVITY = 2400;
  const JUMP_V = -720;
  const PLAYER_W = 44;
  const PLAYER_H = 56;
  const PLAYER_X = 120;
  const POWERUP_DURATION = 4;
  const POWERUP_SIZE = 26;
  const COLOR_LERP = 6;
  const GUN_RESPAWN = 8;
  const GUN_SIZE = 28;
  const BULLET_SPEED = 900;
  const BULLET_W = 12;
  const BULLET_H = 4;
  const GUN_COOLDOWN = 0.18;
  const MONSTER_INTERVAL = 10;
  const MONSTER_HP = 4;
  const MONSTER_W = 56;
  const MONSTER_H = 68;
  const MONSTER_X = W - MONSTER_W - 24;
  const MONSTER_SHOT_INTERVAL = 1.4;
  const MONSTER_SHOT_SPEED = 520;
  const MONSTER_SHOT_W = 10;
  const MONSTER_SHOT_H = 6;
  const REWARD_SIZE = 22;
  const MUZZLE_FLASH_TIME = 0.08;
  const REWARD_INVINCIBLE = 7;

  const THEMES = [
    {
      playerA: "#4fd1ff",
      playerB: "#5ce1a3",
      ui1: "#5ce1a3",
      ui2: "#4fd1ff",
      label: "#7a8fb3",
      inv: "#fbbf24",
      invLight: "#fde68a",
    },
    {
      playerA: "#f472b6",
      playerB: "#a855f7",
      ui1: "#a855f7",
      ui2: "#f472b6",
      label: "#b58ccf",
      inv: "#f472b6",
      invLight: "#fbcfe8",
    },
    {
      playerA: "#f97316",
      playerB: "#fbbf24",
      ui1: "#f97316",
      ui2: "#fbbf24",
      label: "#c79a5b",
      inv: "#f59e0b",
      invLight: "#fde68a",
    },
    {
      playerA: "#22d3ee",
      playerB: "#34d399",
      ui1: "#34d399",
      ui2: "#22d3ee",
      label: "#7fb7c9",
      inv: "#22d3ee",
      invLight: "#bae6fd",
    },
  ];

  const STORAGE_KEY = "neon-runner-best";

  function loadBest() {
    try {
      return parseInt(localStorage.getItem(STORAGE_KEY) || "0", 10) || 0;
    } catch (e) {
      return 0;
    }
  }

  function saveBest(v) {
    try {
      localStorage.setItem(STORAGE_KEY, String(v));
    } catch (e) {}
  }

  let best = loadBest();
  bestEl.textContent = String(best);

  let running = false;
  let lastT = 0;
  let distance = 0;
  let speed = 280;
  let spawnTimer = 0;
  let nextSpawn = 1.05;
  let obstacles = [];
  let particles = [];
  let powerups = [];
  let nextPowerupDist = 1000;
  let firstPowerup = true;
  let invincible = 0;
  let invincibleMax = POWERUP_DURATION;
  let themeIndex = 0;
  let playerColorA = null;
  let playerColorB = null;
  let playerColorATarget = null;
  let playerColorBTarget = null;
  let hasGun = false;
  let gunTimer = 0;
  let gunPickup = null;
  let bullets = [];
  let gunCooldown = 0;
  let shards = [];
  let hurtTimer = 0;
  let lastHitId = 0;
  let obstacleSeq = 0;
  let hurtFlash = 0;
  let gunPickupDelay = 0;
  let monster = null;
  let monsterTimer = 0;
  let monsterShotTimer = 0;
  let monsterShots = [];
  let rewardPickup = null;
  let playerMuzzleFlash = 0;
  let monsterMuzzleFlash = 0;
  let encourageTier = 0;
  let encourageHideTimer = 0;

  const MILESTONE_M = 500;
  const ENCOURAGE_LINES = [
    "太强了，继续前进！",
    "节奏稳住了，别停！",
    "这一程跑得漂亮！",
    "能量满格，冲！",
    "障碍都是纸老虎！",
    "霓虹赛道被你点亮了！",
    "好样的，再来一段！",
    "轻盈落地，继续飞！",
  ];

  const player = {
    y: GROUND_Y - PLAYER_H,
    vy: 0,
    jumpsLeft: 2,
  };

  function resizeCanvas() {
    const pad = 32;
    const maxW = Math.min(900, Math.max(280, window.innerWidth - pad));
    const scale = maxW / 900;
    canvas.style.width = maxW + "px";
    canvas.style.height = 420 * scale + "px";
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();
  applyTheme(THEMES[0], true);

  function resetGame() {
    distance = 0;
    speed = 280;
    spawnTimer = 0;
    nextSpawn = 1.0;
    obstacles = [];
    particles = [];
    powerups = [];
    player.y = GROUND_Y - PLAYER_H;
    player.vy = 0;
    player.jumpsLeft = 2;
    invincible = 0;
    invincibleMax = POWERUP_DURATION;
    nextPowerupDist = 1000;
    firstPowerup = true;
    themeIndex = 0;
    applyTheme(THEMES[themeIndex], true);
    hasGun = false;
    gunTimer = 0;
    gunPickup = null;
    bullets = [];
    gunCooldown = 0;
    shards = [];
    hurtTimer = 0;
    lastHitId = 0;
    hurtFlash = 0;
    gunPickupDelay = 0;
    monster = null;
    monsterTimer = 0;
    monsterShotTimer = 0;
    monsterShots = [];
    rewardPickup = null;
    playerMuzzleFlash = 0;
    monsterMuzzleFlash = 0;
    scoreEl.textContent = "0";
    updateInvincibleHud();
    updateShootBtn();
    encourageTier = 0;
    if (encourageHideTimer) {
      clearTimeout(encourageHideTimer);
      encourageHideTimer = 0;
    }
    if (encourageToast) {
      encourageToast.classList.remove("show");
      encourageToast.textContent = "";
    }
  }

  function showEncouragement(meters) {
    if (!encourageToast) return;
    const line = ENCOURAGE_LINES[Math.floor(Math.random() * ENCOURAGE_LINES.length)];
    encourageToast.textContent = "🎉 达成 " + meters + "m！ " + line;
    encourageToast.classList.remove("show");
    void encourageToast.offsetWidth;
    encourageToast.classList.add("show");
    if (encourageHideTimer) clearTimeout(encourageHideTimer);
    encourageHideTimer = setTimeout(function () {
      encourageToast.classList.remove("show");
      encourageHideTimer = 0;
    }, 2400);
  }

  function updateInvincibleHud() {
    if (!invincibleWrap || !invincibleTimeEl) return;
    if (invincible > 0) {
      invincibleWrap.classList.add("show");
      invincibleTimeEl.textContent = invincible.toFixed(1);
      if (invincibleBarEl) {
        const pct = Math.max(0, Math.min(1, invincible / invincibleMax));
        invincibleBarEl.style.width = (pct * 100).toFixed(1) + "%";
      }
    } else {
      invincibleWrap.classList.remove("show");
      invincibleTimeEl.textContent = "0.0";
      if (invincibleBarEl) invincibleBarEl.style.width = "0%";
    }
  }

  function updateShootBtn() {
    if (!shootBtn) return;
    if (running && hasGun) {
      shootBtn.classList.remove("hidden");
    } else {
      shootBtn.classList.add("hidden");
    }
  }

  function showBossReward() {
    if (!bossRewardToast) return;
    bossRewardToast.classList.remove("show");
    void bossRewardToast.offsetWidth;
    bossRewardToast.classList.add("show");
    setTimeout(function () {
      bossRewardToast.classList.remove("show");
    }, 2000);
  }

  function hexToRgb(hex) {
    const v = hex.replace("#", "");
    const n = parseInt(v, 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
  }

  function rgbToStr(c) {
    return "rgb(" + (c.r | 0) + "," + (c.g | 0) + "," + (c.b | 0) + ")";
  }

  function rgbaStr(c, a) {
    return "rgba(" + (c.r | 0) + "," + (c.g | 0) + "," + (c.b | 0) + "," + a + ")";
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function mixRgb(a, b, t) {
    return {
      r: lerp(a.r, b.r, t),
      g: lerp(a.g, b.g, t),
      b: lerp(a.b, b.b, t),
    };
  }

  function lighten(rgb, t) {
    return mixRgb(rgb, { r: 255, g: 255, b: 255 }, t);
  }

  function darken(rgb, t) {
    return mixRgb(rgb, { r: 0, g: 0, b: 0 }, t);
  }

  function lerpColor(cur, target, t) {
    cur.r = lerp(cur.r, target.r, t);
    cur.g = lerp(cur.g, target.g, t);
    cur.b = lerp(cur.b, target.b, t);
  }

  function applyUiTheme(theme) {
    const root = document.documentElement;
    root.style.setProperty("--accent-1", theme.ui1);
    root.style.setProperty("--accent-2", theme.ui2);
    root.style.setProperty("--accent-label", theme.label);
    root.style.setProperty("--accent-inv", theme.inv);
    root.style.setProperty("--accent-inv-light", theme.invLight);
  }

  function applyTheme(theme, immediate) {
    applyUiTheme(theme);
    playerColorATarget = hexToRgb(theme.playerA);
    playerColorBTarget = hexToRgb(theme.playerB);
    if (immediate || !playerColorA || !playerColorB) {
      playerColorA = hexToRgb(theme.playerA);
      playerColorB = hexToRgb(theme.playerB);
    }
  }

  function advanceTheme() {
    themeIndex = (themeIndex + 1) % THEMES.length;
    applyTheme(THEMES[themeIndex], false);
    playThemeSwitchSound();
  }

  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playPowerupSound() {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(900, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.24);
    } catch (e) {}
  }

  function playJumpSound(isDouble) {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = isDouble ? "square" : "triangle";
      const base = isDouble ? 760 : 620;
      osc.frequency.setValueAtTime(base, now);
      osc.frequency.exponentialRampToValueAtTime(base * 1.35, now + 0.08);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(isDouble ? 0.16 : 0.12, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.18);
    } catch (e) {}
  }

  function playThemeSwitchSound() {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc2.type = "square";
      osc.frequency.setValueAtTime(620, now);
      osc.frequency.exponentialRampToValueAtTime(980, now + 0.22);
      osc2.frequency.setValueAtTime(930, now + 0.08);
      osc2.frequency.exponentialRampToValueAtTime(1400, now + 0.32);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.48);
      osc.connect(gain);
      osc2.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc2.start(now + 0.06);
      osc.stop(now + 0.5);
      osc2.stop(now + 0.5);
    } catch (e) {}
  }

  function playHurtSound() {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(140, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.22);
    } catch (e) {}
  }

  function playBossHurtSound() {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const gain = ctx.createGain();
      osc1.type = "square";
      osc2.type = "sawtooth";
      osc1.frequency.setValueAtTime(320, now);
      osc1.frequency.exponentialRampToValueAtTime(210, now + 0.12);
      osc2.frequency.setValueAtTime(520, now);
      osc2.frequency.exponentialRampToValueAtTime(330, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.12, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(ctx.destination);
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.2);
      osc2.stop(now + 0.2);
    } catch (e) {}
  }

  function playGameStartSound() {
    try {
      const ctx = getAudioCtx();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(880, now + 0.16);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.14, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.24);
    } catch (e) {}
  }

  function playGameOverSound() {

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(420, now);
      osc.frequency.exponentialRampToValueAtTime(160, now + 0.24);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.32);
    } catch (e) {}
  }

  function playHitObstacleSound() {
    try {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(520, now);
      osc.frequency.exponentialRampToValueAtTime(240, now + 0.1);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.14, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + 0.16);
    } catch (e) {}
  }

  function tryJump() {
    if (!running) return;
    if (player.jumpsLeft <= 0) return;
    const isDouble = player.jumpsLeft === 1;
    playJumpSound(isDouble);
    player.vy = JUMP_V;
    player.jumpsLeft--;
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: PLAYER_X + PLAYER_W * 0.5,
        y: player.y + PLAYER_H,
        vx: (Math.random() - 0.5) * 120,
        vy: Math.random() * 80 + 40,
        life: 0.35 + Math.random() * 0.2,
        age: 0,
        hue: 150 + Math.random() * 40,
      });
    }
  }

  function tryShoot() {
    if (!running || !hasGun) return;
    if (gunCooldown > 0) return;
    gunCooldown = GUN_COOLDOWN;
    playerMuzzleFlash = MUZZLE_FLASH_TIME;
    const muzzleY = player.y + PLAYER_H * 0.15;
    bullets.push({
      x: PLAYER_X + PLAYER_W + 4,
      y: muzzleY,
      w: BULLET_W,
      h: BULLET_H,
      vx: BULLET_SPEED,
    });
  }

  var lastPointerMs = 0;
  function onTap(ev) {
    if (ev && typeof ev.preventDefault === "function") ev.preventDefault();
    var now = ev && ev.timeStamp != null ? ev.timeStamp : performance.now();
    if (now - lastPointerMs < 45) return;
    lastPointerMs = now;
    if (!running && !overlay.classList.contains("hidden")) {
      startGame();
      return;
    }
    if (!running && !gameover.classList.contains("hidden")) {
      startGame();
      return;
    }
    tryJump();
  }

  function spawnObstacle() {
    const roll = Math.random();
    let type = "block";
    let w = 36 + Math.random() * 28;
    let h = 40 + Math.random() * 36;
    let y = GROUND_Y - h;

    if (roll > 0.78) {
      type = "air";
      w = 48 + Math.random() * 36;
      h = 22 + Math.random() * 14;
      y = GROUND_Y - PLAYER_H - 70 - Math.random() * 18;
    } else if (roll > 0.56) {
      type = "low";
      w = 52 + Math.random() * 40;
      h = 28 + Math.random() * 14;
      y = GROUND_Y - h;
    } else if (roll > 0.32) {
      type = "tall";
      w = 30 + Math.random() * 16;
      h = 70 + Math.random() * 50;
      y = GROUND_Y - h;
    }

    obstacles.push({
      id: ++obstacleSeq,
      x: W + 20,
      y,
      w,
      h,
      type,
      passed: false,
      destructible: type === "tall" || type === "block",
      hp: type === "tall" || type === "block" ? 3 : 0,
      maxHp: type === "tall" || type === "block" ? 3 : 0,
    });
  }

  function spawnPowerup() {
    const y = GROUND_Y - PLAYER_H - 70;
    powerups.push({
      x: W + 60,
      y,
      w: POWERUP_SIZE,
      h: POWERUP_SIZE,
      collected: false,
    });
  }

  function spawnGunPickup() {
    const air = Math.random() < 0.5;
    const y = air
      ? GROUND_Y - PLAYER_H - 90 - Math.random() * 18
      : GROUND_Y - GUN_SIZE - 6;
    gunPickup = {
      x: W + 60,
      y,
      w: GUN_SIZE,
      h: GUN_SIZE,
    };
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function update(dt) {
    distance += speed * dt;
    const displayM = Math.floor(distance / 10);
    scoreEl.textContent = String(displayM);
    const shardColorBase = playerColorA ? playerColorA : hexToRgb("#4fd1ff");

    const tier = Math.floor(displayM / MILESTONE_M);
    if (tier > encourageTier) {
      encourageTier = tier;
      showEncouragement(tier * MILESTONE_M);
      advanceTheme();
    }

    speed = Math.min(520, 280 + distance * 0.012);

    spawnTimer += dt;
    const gap = Math.max(0.55, nextSpawn - distance * 0.00002);
    if (spawnTimer >= gap) {
      spawnTimer = 0;
      nextSpawn = 0.92 + Math.random() * 0.65;
      spawnObstacle();
    }

    if (distance >= nextPowerupDist && powerups.length === 0) {
      spawnPowerup();
      if (firstPowerup) {
        nextPowerupDist = 9000;
        firstPowerup = false;
      } else {
        nextPowerupDist += 9000;
      }
    }

    if (gunCooldown > 0) {
      gunCooldown = Math.max(0, gunCooldown - dt);
    }
    if (playerMuzzleFlash > 0) {
      playerMuzzleFlash = Math.max(0, playerMuzzleFlash - dt);
    }
    if (monsterMuzzleFlash > 0) {
      monsterMuzzleFlash = Math.max(0, monsterMuzzleFlash - dt);
    }
    if (gunPickupDelay > 0) {
      gunPickupDelay = Math.max(0, gunPickupDelay - dt);
    }
    if (gunPickupDelay > 0) {
      gunPickupDelay = Math.max(0, gunPickupDelay - dt);
    }

    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;

    const floor = GROUND_Y - PLAYER_H;
    if (player.y >= floor) {
      player.y = floor;
      player.vy = 0;
      player.jumpsLeft = 2;
    }

    if (!hasGun) {
      gunTimer += dt;
      if (!monster) {
        monsterTimer = 0;
      }
      if (!gunPickup && gunTimer >= GUN_RESPAWN) {
        spawnGunPickup();
        gunTimer = 0;
      }
    } else {
      gunTimer = 0;
      monsterTimer += dt;
      if (!monster && monsterTimer >= MONSTER_INTERVAL) {
        monsterTimer = 0;
        monsterShotTimer = 0;
        monster = {
          x: MONSTER_X,
          y: GROUND_Y - MONSTER_H,
          w: MONSTER_W,
          h: MONSTER_H,
          hp: MONSTER_HP,
          maxHp: MONSTER_HP,
          name: "华雄",
        };
      }
    }

    if (invincible > 0) {
      invincible = Math.max(0, invincible - dt);
    }
    updateInvincibleHud();
    if (hurtTimer > 0) {
      hurtTimer = Math.max(0, hurtTimer - dt);
    }
    if (hurtFlash > 0) {
      hurtFlash = Math.max(0, hurtFlash - dt);
    }

    if (playerColorA && playerColorATarget) {
      const t = Math.min(1, COLOR_LERP * dt);
      lerpColor(playerColorA, playerColorATarget, t);
      lerpColor(playerColorB, playerColorBTarget, t);
    }

    if (gunPickup) {
      gunPickup.x -= speed * dt;
      if (
        rectsOverlap(
          PLAYER_X + 6,
          player.y + 6,
          PLAYER_W - 12,
          PLAYER_H - 10,
          gunPickup.x,
          gunPickup.y,
          gunPickup.w,
          gunPickup.h
        )
      ) {
        if (gunPickupDelay <= 0 && hurtTimer <= 0) {
          hasGun = true;
          gunPickup = null;
          updateShootBtn();
        }
      } else if (gunPickup.x + gunPickup.w < -40) {
        gunPickup = null;
        gunTimer = 0;
      }
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt;
      if (b.x > W + 40) {
        bullets.splice(i, 1);
      }
    }

    if (monster) {
      monsterShotTimer += dt;
      monster.x = MONSTER_X;
      if (monsterShotTimer >= MONSTER_SHOT_INTERVAL) {
        monsterShotTimer = 0;
        monsterMuzzleFlash = MUZZLE_FLASH_TIME;
        monsterShots.push({
          x: monster.x - 8,
          y: GROUND_Y - 18,
          w: MONSTER_SHOT_W,
          h: MONSTER_SHOT_H,
          vx: -MONSTER_SHOT_SPEED,
        });
      }
    }

    for (let i = monsterShots.length - 1; i >= 0; i--) {
      const s = monsterShots[i];
      s.x += s.vx * dt;
      if (s.x + s.w < -60) {
        monsterShots.splice(i, 1);
        continue;
      }
      if (
        rectsOverlap(
          PLAYER_X + 6,
          player.y + 6,
          PLAYER_W - 12,
          PLAYER_H - 10,
          s.x,
          s.y,
          s.w,
          s.h
        )
      ) {
        monsterShots.splice(i, 1);
        if (invincible <= 0 && hurtTimer <= 0) {
          if (hasGun) {
            hasGun = false;
            bullets = [];
            gunCooldown = 0;
            gunTimer = 0;
            updateShootBtn();
            hurtTimer = 0.25;
            hurtFlash = 0.8;
            playHurtSound();
          } else {
            endGame();
            return;
          }
        }
      }
    }

    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.x -= speed * dt;
      if (
        rectsOverlap(
          PLAYER_X + 6,
          player.y + 6,
          PLAYER_W - 12,
          PLAYER_H - 10,
          p.x,
          p.y,
          p.w,
          p.h
        )
      ) {
        invincible = POWERUP_DURATION;
        invincibleMax = POWERUP_DURATION;
        playPowerupSound();
        powerups.splice(i, 1);
        continue;
      }
      if (p.x + p.w < -40) {
        powerups.splice(i, 1);
      }
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed * dt;
      let destroyed = false;
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (rectsOverlap(b.x, b.y, b.w, b.h, o.x, o.y, o.w, o.h)) {
          const bulletY = b.y + b.h * 0.5;
          const destroyable =
            o.destructible !== false && bulletY >= o.y && bulletY <= o.y + o.h;
          bullets.splice(j, 1);
          if (destroyable) {
            o.hp -= 1;
            playHitObstacleSound();
            if (o.hp <= 0) {
              for (let k = 0; k < 10; k++) {
                shards.push({
                  x: o.x + o.w * (0.2 + Math.random() * 0.6),
                  y: o.y + o.h * (0.2 + Math.random() * 0.6),
                  w: 4 + Math.random() * 6,
                  h: 3 + Math.random() * 5,
                  vx: (Math.random() - 0.2) * 220,
                  vy: -120 - Math.random() * 220,
                  vr: (Math.random() - 0.5) * 8,
                  rot: Math.random() * Math.PI,
                  life: 0.45 + Math.random() * 0.25,
                  age: 0,
                  color: rgbaStr(shardColorBase, 0.9),
                });
              }
              obstacles.splice(i, 1);
              destroyed = true;
            }
          } else {
            playHitObstacleSound();
            particles.push({
              x: b.x,
              y: b.y,
              vx: -60 + Math.random() * 40,
              vy: -40 - Math.random() * 40,
              life: 0.18 + Math.random() * 0.12,
              age: 0,
              hue: 210 + Math.random() * 20,
            });
          }
          break;
        }
      }
      if (destroyed) continue;
      if (!o.passed && o.x + o.w < PLAYER_X) {
        o.passed = true;
      }
      if (o.x + o.w < -40) {
        obstacles.splice(i, 1);
        continue;
      }
      if (
        rectsOverlap(
          PLAYER_X + 6,
          player.y + 6,
          PLAYER_W - 12,
          PLAYER_H - 10,
          o.x + 2,
          o.y + 2,
          o.w - 4,
          o.h - 4
        )
      ) {
        if (invincible <= 0 && hurtTimer <= 0) {
          if (hasGun) {
            hasGun = false;
            bullets = [];
            gunCooldown = 0;
            gunTimer = 0;
            updateShootBtn();
            hurtTimer = 0.25;
            lastHitId = o.id || 0;
            hurtFlash = 0.8;
            playHurtSound();
          } else {
            endGame();
            return;
          }
        } else if (invincible <= 0 && hurtTimer > 0) {
          if (!hasGun && (o.id || 0) !== lastHitId) {
            endGame();
            return;
          }
        }
      }
    }

    if (monster) {
      for (let j = bullets.length - 1; j >= 0; j--) {
        const b = bullets[j];
        if (rectsOverlap(b.x, b.y, b.w, b.h, monster.x, monster.y, monster.w, monster.h)) {
          bullets.splice(j, 1);
          monster.hp -= 1;
          playBossHurtSound();
          for (let k = 0; k < 6; k++) {
            particles.push({
              x: b.x + Math.random() * 6,
              y: b.y + Math.random() * 6,
              vx: (Math.random() - 0.5) * 120,
              vy: -60 - Math.random() * 80,
              life: 0.22 + Math.random() * 0.15,
              age: 0,
              hue: 350 + Math.random() * 20,
            });
          }
          if (monster.hp <= 0) {
            rewardPickup = {
              x: monster.x + monster.w * 0.4,
              y: monster.y - 14,
              w: REWARD_SIZE,
              h: REWARD_SIZE,
            };
            for (let k = 0; k < 12; k++) {
              shards.push({
                x: monster.x + monster.w * (0.2 + Math.random() * 0.6),
                y: monster.y + monster.h * (0.2 + Math.random() * 0.6),
                w: 4 + Math.random() * 6,
                h: 3 + Math.random() * 5,
                vx: (Math.random() - 0.2) * 220,
                vy: -140 - Math.random() * 220,
                vr: (Math.random() - 0.5) * 8,
                rot: Math.random() * Math.PI,
                life: 0.45 + Math.random() * 0.25,
                age: 0,
                color: "rgba(244, 114, 182, 0.9)",
              });
            }
            monster = null;
          }
          break;
        }
      }
    }

    if (rewardPickup) {
      rewardPickup.x -= speed * dt;
      if (
        rectsOverlap(
          PLAYER_X + 6,
          player.y + 6,
          PLAYER_W - 12,
          PLAYER_H - 10,
          rewardPickup.x,
          rewardPickup.y,
          rewardPickup.w,
          rewardPickup.h
        )
      ) {
        invincible = REWARD_INVINCIBLE;
        invincibleMax = REWARD_INVINCIBLE;
        playPowerupSound();
        showBossReward();
        rewardPickup = null;
      } else if (rewardPickup.x + rewardPickup.w < -40) {
        rewardPickup = null;
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += GRAVITY * 0.35 * dt;
      if (p.age >= p.life) particles.splice(i, 1);
    }

    for (let i = shards.length - 1; i >= 0; i--) {
      const s = shards[i];
      s.age += dt;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += GRAVITY * 0.6 * dt;
      s.rot += s.vr * dt;
      if (s.age >= s.life) shards.splice(i, 1);
    }
  }

  function drawBackground(t) {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0d1324");
    g.addColorStop(1, "#111827");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    const gridOff = (t * 40) % 48;
    ctx.strokeStyle = "rgba(79, 209, 255, 0.06)";
    ctx.lineWidth = 1;
    for (let x = -gridOff; x < W; x += 48) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 48) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    const far = (t * 60) % 200;
    ctx.fillStyle = "rgba(92, 225, 163, 0.08)";
    for (let i = 0; i < 8; i++) {
      const bx = ((i * 200 - far) % 1600) - 200;
      ctx.fillRect(bx, GROUND_Y - 120 - (i % 3) * 20, 80, 8);
    }
  }

  function drawGround(t) {
    const scroll = (t * speed * 0.15) % 64;
    const cA = playerColorA ? playerColorA : hexToRgb("#4fd1ff");
    const cB = playerColorB ? playerColorB : hexToRgb("#5ce1a3");
    const baseGround = hexToRgb("#1e293b");
    const groundFill = mixRgb(baseGround, cB, 0.22);
    ctx.fillStyle = rgbToStr(groundFill);
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.strokeStyle = rgbaStr(cA, 0.55);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    ctx.strokeStyle = rgbaStr(cB, 0.25);
    for (let x = -scroll; x < W; x += 32) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y + 12);
      ctx.lineTo(x + 16, GROUND_Y + 12);
      ctx.stroke();
    }
  }

  function roundRect(c, x, y, w, h, r) {
    const rr = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + rr, y);
    c.arcTo(x + w, y, x + w, y + h, rr);
    c.arcTo(x + w, y + h, x, y + h, rr);
    c.arcTo(x, y + h, x, y, rr);
    c.arcTo(x, y, x + w, y, rr);
    c.closePath();
  }

  function drawPlayer() {
    const px = PLAYER_X;
    const py = player.y;
    ctx.save();
    if (hurtFlash > 0) {
      const pulse = 0.5 + 0.5 * Math.sin(performance.now() * 0.04);
      ctx.globalAlpha = 0.45 + 0.45 * pulse;
    }
    if (invincible > 0) {
      const pulse = 0.4 + 0.6 * Math.sin(performance.now() * 0.01);
      ctx.shadowColor = "rgba(255, 214, 10, " + (0.4 + pulse * 0.4) + ")";
      ctx.shadowBlur = 18;
    } else {
      ctx.shadowColor = "rgba(79, 209, 255, 0.6)";
      ctx.shadowBlur = 12;
    }
    let ox = px;
    let oy = py;
    if (hasGun) {
      const cx = px + PLAYER_W * 0.45;
      const cy = py + PLAYER_H * 0.55;
      ctx.translate(cx, cy);
      ctx.rotate(-0.18);
      ox = -PLAYER_W * 0.45;
      oy = -PLAYER_H * 0.55;
    }
    const body = ctx.createLinearGradient(ox, oy, ox + PLAYER_W, oy + PLAYER_H);
    const c1 = playerColorA ? rgbToStr(playerColorA) : "#4fd1ff";
    const c2 = playerColorB ? rgbToStr(playerColorB) : "#5ce1a3";
    body.addColorStop(0, c1);
    body.addColorStop(1, c2);
    ctx.fillStyle = body;
    roundRect(ctx, ox, oy, PLAYER_W, PLAYER_H, 10);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = "rgba(6, 16, 24, 0.85)";
    roundRect(ctx, ox + 10, oy + 12, 24, 18, 6);
    ctx.fill();
    ctx.fillStyle = "#e8f0ff";
    ctx.beginPath();
    ctx.arc(ox + 18, oy + 20, 3, 0, Math.PI * 2);
    ctx.arc(ox + 28, oy + 20, 3, 0, Math.PI * 2);
    ctx.fill();

    if (hasGun) {
      ctx.fillStyle = "rgba(6, 16, 24, 0.9)";
      roundRect(ctx, ox + 26, oy + 30, 28, 8, 4);
      ctx.fill();
      const gunX = ox + PLAYER_W - 2;
      const gunY = oy + PLAYER_H * 0.18;
      ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
      roundRect(ctx, gunX, gunY + 6, 12, 8, 3);
      ctx.fill();
      ctx.fillStyle = "rgba(94, 225, 163, 0.95)";
      roundRect(ctx, gunX + 8, gunY + 4, 16, 6, 3);
      ctx.fill();
      ctx.fillStyle = "rgba(79, 209, 255, 0.95)";
      roundRect(ctx, gunX + 6, gunY + 10, 6, 10, 2);
      ctx.fill();
      if (playerMuzzleFlash > 0) {
        const a = Math.max(0, playerMuzzleFlash / MUZZLE_FLASH_TIME);
        ctx.save();
        ctx.globalAlpha = 0.5 + 0.5 * a;
        ctx.fillStyle = "rgba(255, 214, 10, 0.95)";
        ctx.beginPath();
        ctx.moveTo(gunX + 24, gunY + 7);
        ctx.lineTo(gunX + 38, gunY + 3);
        ctx.lineTo(gunX + 34, gunY + 12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "rgba(255, 120, 40, 0.9)";
        ctx.beginPath();
        ctx.moveTo(gunX + 22, gunY + 7);
        ctx.lineTo(gunX + 32, gunY + 6);
        ctx.lineTo(gunX + 28, gunY + 11);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
    }

    if (hurtFlash > 0) {
      const pulse = 0.4 + 0.6 * Math.sin(performance.now() * 0.05);
      ctx.save();
      ctx.globalAlpha = 0.35 + 0.35 * pulse;
      ctx.fillStyle = "rgba(255, 64, 64, 0.85)";
      roundRect(ctx, ox, oy, PLAYER_W, PLAYER_H, 10);
      ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawPowerups() {
    for (const p of powerups) {
      const cx = p.x + p.w / 2;
      const cy = p.y + p.h / 2;
      ctx.save();
      ctx.shadowColor = "rgba(255, 214, 10, 0.7)";
      ctx.shadowBlur = 14;
      const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, p.w);
      grad.addColorStop(0, "rgba(255, 255, 255, 0.95)");
      grad.addColorStop(0.4, "rgba(255, 214, 10, 0.9)");
      grad.addColorStop(1, "rgba(255, 122, 24, 0.9)");
      ctx.fillStyle = grad;
      roundRect(ctx, p.x, p.y, p.w, p.h, 8);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawGunPickup() {
    if (!gunPickup) return;
    const g = gunPickup;
    ctx.save();
    ctx.shadowColor = "rgba(255, 255, 255, 0.3)";
    ctx.shadowBlur = 12;
    const cA = playerColorA ? playerColorA : hexToRgb("#4fd1ff");
    const cB = playerColorB ? playerColorB : hexToRgb("#5ce1a3");
    ctx.fillStyle = rgbaStr(cA, 0.95);
    roundRect(ctx, g.x + 4, g.y + 8, g.w - 4, 10, 4); // barrel
    ctx.fill();
    ctx.fillStyle = rgbaStr(cB, 0.95);
    roundRect(ctx, g.x, g.y + 10, g.w - 8, 8, 4); // slide
    ctx.fill();
    ctx.fillStyle = "rgba(15, 23, 42, 0.9)";
    roundRect(ctx, g.x + 6, g.y + 16, 8, 12, 3); // grip
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(g.x + 12, g.y + 18);
    ctx.lineTo(g.x + 10, g.y + 22); // trigger hint
    ctx.stroke();
    ctx.restore();
  }

  function drawMonster() {
    if (!monster) return;
    const m = monster;
    const cA = playerColorA ? playerColorA : hexToRgb("#4fd1ff");
    const cB = playerColorB ? playerColorB : hexToRgb("#5ce1a3");
    const grad = ctx.createLinearGradient(m.x, m.y, m.x + m.w, m.y + m.h);
    grad.addColorStop(0, rgbToStr(darken(cA, 0.55)));
    grad.addColorStop(1, rgbToStr(darken(cB, 0.6)));
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.55)";
    ctx.shadowBlur = 14;
    ctx.fillStyle = grad;
    roundRect(ctx, m.x, m.y, m.w, m.h, 10);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(255, 80, 80, 0.55)";
    ctx.lineWidth = 2;
    roundRect(ctx, m.x + 1, m.y + 1, m.w - 2, m.h - 2, 10);
    ctx.stroke();

    // Horns
    ctx.fillStyle = "rgba(255, 80, 80, 0.85)";
    ctx.beginPath();
    ctx.moveTo(m.x + 8, m.y + 6);
    ctx.lineTo(m.x - 2, m.y + 2);
    ctx.lineTo(m.x + 6, m.y + 16);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(m.x + m.w - 8, m.y + 6);
    ctx.lineTo(m.x + m.w + 2, m.y + 2);
    ctx.lineTo(m.x + m.w - 6, m.y + 16);
    ctx.closePath();
    ctx.fill();

    // Face
    ctx.fillStyle = "rgba(6, 10, 18, 0.9)";
    roundRect(ctx, m.x + 10, m.y + 20, m.w - 20, 16, 6);
    ctx.fill();
    ctx.fillStyle = "rgba(255, 80, 80, 0.95)";
    ctx.beginPath();
    ctx.arc(m.x + 18, m.y + 28, 3.2, 0, Math.PI * 2);
    ctx.arc(m.x + m.w - 18, m.y + 28, 3.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(255, 80, 80, 0.7)";
    ctx.beginPath();
    ctx.moveTo(m.x + 16, m.y + 36);
    ctx.lineTo(m.x + m.w - 16, m.y + 36);
    ctx.stroke();

    // Gun in hand (aiming left)
    const gunX = m.x - 8;
    const gunY = m.y + m.h * 0.55;
    ctx.fillStyle = "rgba(12, 18, 30, 0.95)";
    roundRect(ctx, gunX, gunY + 6, 16, 8, 3); // body
    ctx.fill();
    ctx.fillStyle = "rgba(255, 80, 80, 0.85)";
    roundRect(ctx, gunX - 14, gunY + 5, 18, 6, 3); // barrel to the left
    ctx.fill();
    if (monsterMuzzleFlash > 0) {
      const a = Math.max(0, monsterMuzzleFlash / MUZZLE_FLASH_TIME);
      ctx.save();
      ctx.globalAlpha = 0.5 + 0.5 * a;
      ctx.fillStyle = "rgba(255, 80, 80, 0.95)";
      ctx.beginPath();
      ctx.moveTo(gunX - 18, gunY + 7);
      ctx.lineTo(gunX - 34, gunY + 3);
      ctx.lineTo(gunX - 30, gunY + 12);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "rgba(255, 160, 60, 0.9)";
      ctx.beginPath();
      ctx.moveTo(gunX - 16, gunY + 7);
      ctx.lineTo(gunX - 26, gunY + 6);
      ctx.lineTo(gunX - 22, gunY + 11);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    ctx.font = "bold 13px \"Segoe UI\", \"PingFang SC\", sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fillText(m.name, m.x + m.w / 2, m.y - 16);
    const barW = 48;
    const barH = 6;
    const barX = m.x + m.w / 2 - barW / 2;
    const barY = m.y - 10;
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    roundRect(ctx, barX, barY, barW, barH, 3);
    ctx.fill();
    const segmentW = (barW - 6) / m.maxHp;
    for (let i = 0; i < m.maxHp; i++) {
      const filled = i < m.hp;
      ctx.fillStyle = filled ? "rgba(255, 99, 99, 0.95)" : "rgba(255,255,255,0.18)";
      const sx = barX + 3 + i * segmentW;
      roundRect(ctx, sx, barY + 1, segmentW - 2, barH - 2, 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawMonsterShots() {
    if (!monsterShots.length) return;
    ctx.save();
    ctx.shadowColor = "rgba(255, 120, 120, 0.6)";
    ctx.shadowBlur = 10;
    ctx.fillStyle = "rgba(255, 120, 120, 0.95)";
    for (const s of monsterShots) {
      roundRect(ctx, s.x, s.y, s.w, s.h, 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawReward() {
    if (!rewardPickup) return;
    const r = rewardPickup;
    ctx.save();
    ctx.shadowColor = "rgba(255, 214, 10, 0.7)";
    ctx.shadowBlur = 12;
    ctx.fillStyle = "rgba(255, 214, 10, 0.95)";
    roundRect(ctx, r.x, r.y, r.w, r.h, 6);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    roundRect(ctx, r.x + 5, r.y + 5, r.w - 10, r.h - 10, 4);
    ctx.fill();
    ctx.restore();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      const grad = ctx.createLinearGradient(o.x, o.y, o.x + o.w, o.y + o.h);
      const cA = playerColorA ? playerColorA : hexToRgb("#4fd1ff");
      const cB = playerColorB ? playerColorB : hexToRgb("#5ce1a3");
      const indestructible = o.destructible === false;
      if (o.type === "air") {
        grad.addColorStop(0, rgbaStr(lighten(cA, 0.3), 0.9));
        grad.addColorStop(1, rgbaStr(lighten(cB, 0.25), 0.85));
      } else if (indestructible) {
        const d1 = darken(cA, 0.55);
        const d2 = darken(cB, 0.55);
        grad.addColorStop(0, rgbToStr(d1));
        grad.addColorStop(1, rgbToStr(d2));
      } else if (o.type === "tall") {
        grad.addColorStop(0, rgbToStr(cA));
        grad.addColorStop(1, rgbToStr(cB));
      } else if (o.type === "low") {
        grad.addColorStop(0, rgbToStr(lighten(cB, 0.25)));
        grad.addColorStop(1, rgbToStr(cB));
      } else {
        grad.addColorStop(0, rgbToStr(darken(cA, 0.35)));
        grad.addColorStop(1, rgbToStr(darken(cB, 0.35)));
      }
      ctx.fillStyle = grad;
      ctx.shadowColor = rgbaStr(cA, o.type === "air" ? 0.35 : 0.2);
      ctx.shadowBlur = 8;
      roundRect(ctx, o.x, o.y, o.w, o.h, 6);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (indestructible) {
        ctx.save();
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2.4;
        roundRect(ctx, o.x + 1, o.y + 1, o.w - 2, o.h - 2, 6);
        ctx.stroke();
        ctx.restore();
      }

      const maxHp = o.maxHp || 3;
      const damage = maxHp - o.hp;
      if (damage > 0 && o.type !== "air" && !indestructible) {
        ctx.save();
        const crackColor = damage === 1 ? "rgba(255,255,255,0.65)" : damage === 2 ? "rgba(255,255,255,0.8)" : "rgba(255,255,255,0.95)";
        ctx.strokeStyle = crackColor;
        ctx.lineWidth = damage === 1 ? 1.6 : damage === 2 ? 2.4 : 3.2;
        ctx.shadowColor = "rgba(0,0,0,0.25)";
        ctx.shadowBlur = 4;
        const cx = o.x + o.w * 0.55;
        const cy = o.y + o.h * 0.35;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx - o.w * 0.25, cy + o.h * 0.2);
        ctx.lineTo(cx - o.w * 0.1, cy + o.h * 0.45);
        ctx.stroke();
        if (damage >= 2) {
          ctx.beginPath();
          ctx.moveTo(cx + o.w * 0.05, cy + o.h * 0.1);
          ctx.lineTo(cx + o.w * 0.25, cy + o.h * 0.3);
          ctx.lineTo(cx + o.w * 0.1, cy + o.h * 0.55);
          ctx.stroke();
        }
        if (damage >= 3) {
          ctx.beginPath();
          ctx.moveTo(o.x + o.w * 0.2, o.y + o.h * 0.75);
          ctx.lineTo(o.x + o.w * 0.45, o.y + o.h * 0.6);
          ctx.lineTo(o.x + o.w * 0.7, o.y + o.h * 0.8);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(o.x + o.w * 0.15, o.y + o.h * 0.25);
          ctx.lineTo(o.x + o.w * 0.4, o.y + o.h * 0.15);
          ctx.lineTo(o.x + o.w * 0.6, o.y + o.h * 0.3);
          ctx.stroke();
        }
        ctx.restore();
      }
    }
  }

  function drawBullets() {
    ctx.save();
    ctx.shadowColor = "rgba(255, 255, 255, 0.5)";
    ctx.shadowBlur = 8;
    ctx.fillStyle = "rgba(255, 244, 214, 0.95)";
    for (const b of bullets) {
      roundRect(ctx, b.x, b.y, b.w, b.h, 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = 1 - p.age / p.life;
      ctx.fillStyle = "hsla(" + p.hue + ", 80%, 60%, " + a + ")";
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawShards() {
    for (const s of shards) {
      const a = 1 - s.age / s.life;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.fillStyle = s.color;
      roundRect(ctx, -s.w * 0.5, -s.h * 0.5, s.w, s.h, 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function draw(t) {
    drawBackground(t);
    drawGround(t);
    drawObstacles();
    drawMonster();
    drawMonsterShots();
    drawReward();
    drawGunPickup();
    drawBullets();
    drawPowerups();
    drawPlayer();
    drawShards();
    drawParticles();
  }

  function loop(ts) {
    if (!running) return;
    const t = ts * 0.001;
    if (!lastT) lastT = t;
    let dt = t - lastT;
    lastT = t;
    dt = Math.min(dt, 0.05);
    update(dt);
    draw(t);
    requestAnimationFrame(loop);
  }

  function startGame() {
    overlay.classList.add("hidden");
    gameover.classList.add("hidden");
    resetGame();
    running = true;
    lastT = 0;
    playGameStartSound();
    updateShootBtn();
    requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    playGameOverSound();
    updateShootBtn();
    const d = Math.floor(distance / 10);
    finalEl.textContent = String(d);
    if (d > best) {
      best = d;
      saveBest(best);
      bestEl.textContent = String(best);
    }
    gameover.classList.remove("hidden");
  }

  btnStart.addEventListener("click", function (e) {
    e.preventDefault();
    startGame();
  });
  btnRetry.addEventListener("click", function (e) {
    e.preventDefault();
    startGame();
  });
  if (shootBtn) {
    shootBtn.addEventListener("pointerdown", function (e) {
      e.preventDefault();
      tryShoot();
    });
  }

  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " ") {
      e.preventDefault();
      if (!running && !overlay.classList.contains("hidden")) {
        startGame();
        return;
      }
      if (!running && !gameover.classList.contains("hidden")) {
        startGame();
        return;
      }
      tryJump();
      return;
    }
    if (e.code === "KeyF" || e.code === "KeyJ") {
      e.preventDefault();
      tryShoot();
    }
  });

  canvas.addEventListener("pointerdown", onTap, { passive: false });
  if (!window.PointerEvent) {
    canvas.addEventListener("touchstart", onTap, { passive: false });
  }

  document.addEventListener(
    "visibilitychange",
    function () {
      if (document.hidden && running) {
        lastT = 0;
        if (audioCtx && audioCtx.state === "running") {
          audioCtx.suspend();
        }
      } else if (!document.hidden && running) {
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      }
    },
    false
  );

  draw(0);
})();
  </script>
</body>
</html>
